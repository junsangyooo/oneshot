<!-- templates/game.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Dalmuti - Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="gameBody" data-num-players="{{ game.num_players }}" data-player="{{ player }}">
    <div id="gameContainer">
        <!-- Player Sections -->
        <div id="boardSection">
            <div class="playerCircle" id="player1"></div>
            <div class="playerCircle" id="player2"></div>
            <div class="playerCircle" id="player3"></div>
            <div class="playerCircle" id="player4"></div>
            <div class="playerCircle" id="player5"></div>
            <div class="playerCircle" id="player6"></div>
            <div class="playerCircle" id="player7"></div>
          
            <div id="board">
                <!-- Cards placed on the board -->
            </div>
        </div>
        
        <div id="playerControlBody">
            <div id="rank">
                <!-- Player rank -->
            </div>
          
            <ul id="hand">
                <!-- Dynamically populated list of player's cards -->
            </ul>
          
            <button id="passButton"></button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
