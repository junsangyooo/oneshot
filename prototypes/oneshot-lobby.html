<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneShot — Sector Lobby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="oneshot.css" />
    <style>
      body { overflow: hidden; }
      .shell {
        position: relative; z-index: 2; height: 100svh; overflow: hidden;
        padding: var(--frame-pad);
        display: grid; grid-template-rows: auto 1fr auto; gap: 18px;
      }

      /* ---- top bar ---- */
      .topbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; }
      .sector { text-align: center; }
      .sector .lbl { font-size: 11px; letter-spacing: 0.3em; color: var(--ink-dim); }
      .sector .code {
        font-family: var(--font-mono); font-weight: 700; font-size: clamp(28px, 4vw, 46px);
        letter-spacing: 0.14em; color: var(--ink); display: inline-flex; align-items: center; gap: 14px;
        text-shadow: 0 0 30px rgb(var(--glow-red) / 0.25);
      }
      .sector .copy {
        font-size: 18px; color: var(--ink-dim); cursor: pointer; border: 0; background: none;
        transition: color 0.2s;
      }
      .sector .copy:hover { color: var(--cyan); }
      .readout--r { text-align: right; }

      /* ---- 3 columns: LEFT access · CENTER modules(main) · RIGHT operators ---- */
      .cols {
        display: grid; grid-template-columns: 300px minmax(0, 1fr) 340px; gap: 30px; min-height: 0;
      }
      .col { min-height: 0; display: grid; align-content: start; gap: 24px; overflow-y: auto; }
      .col::-webkit-scrollbar { width: 4px; }
      .col::-webkit-scrollbar-thumb { background: var(--line-bright); }

      /* center column: fixed hero + commander, only the module grid scrolls */
      .col--center {
        overflow: hidden; align-content: stretch; gap: 16px;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
      }
      .avail { display: grid; grid-template-rows: auto minmax(0, 1fr); gap: 12px; min-height: 0; }
      .avail .mod-grid { overflow-y: auto; min-height: 0; align-content: start; padding-right: 6px; }
      .avail .mod-grid::-webkit-scrollbar { width: 4px; }
      .avail .mod-grid::-webkit-scrollbar-thumb { background: var(--line-bright); }

      /* ===== LEFT: access / share ===== */
      .link-box {
        border: 1px solid var(--line); padding: 16px; display: grid; gap: 14px;
      }
      .link-url { font-size: 12px; color: var(--ink-dim); letter-spacing: 0.04em; word-break: break-all; }
      .qr-wrap { display: grid; gap: 10px; }
      .qr-box { border: 1px solid var(--line); padding: 18px; }
      .sub-note { font-size: 10px; letter-spacing: 0.18em; color: var(--ink-faint); text-align: center; text-transform: uppercase; }
      .enc { display: grid; gap: 8px; }
      .enc-row { display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 0.12em; color: var(--ink-dim); text-transform: uppercase; }
      .enc-bar { height: 3px; background: var(--line); position: relative; overflow: hidden; }
      .enc-bar i { position: absolute; inset: 0 18% 0 0; background: linear-gradient(90deg, var(--teal), var(--cyan)); }

      /* ===== CENTER: module selection (MAIN) ===== */
      .head-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
      .head-row h2 {
        margin: 0; font-family: var(--font-mono); font-weight: 700; font-size: clamp(20px, 2.6vw, 30px);
        letter-spacing: 0.08em; color: var(--ink);
      }
      .count-chip {
        font-size: 12px; letter-spacing: 0.1em; color: var(--ink-dim);
        border: 1px solid var(--line); padding: 4px 9px;
      }
      .priority { font-size: 11px; letter-spacing: 0.18em; color: var(--ink-faint); text-transform: uppercase; }

      /* selected hero */
      .hero {
        border: 1px solid rgb(var(--glow-red) / 0.55); background: rgb(var(--glow-red) / 0.08);
        padding: 22px; display: grid; gap: 12px; position: relative;
      }
      .hero::before, .hero::after { content: ""; position: absolute; width: 18px; height: 18px; border-color: var(--accent); }
      .hero::before { top: -1px; left: -1px; border-top: 2px solid; border-left: 2px solid; }
      .hero::after { bottom: -1px; right: -1px; border-bottom: 2px solid; border-right: 2px solid; }
      .hero .sel { font-size: 11px; letter-spacing: 0.2em; color: var(--accent); }
      .hero .title {
        font-family: var(--font-mono); font-weight: 700; font-size: clamp(22px, 3vw, 34px);
        letter-spacing: 0.06em; color: #fff;
      }
      .hero .desc { font-size: 12px; color: var(--ink-dim); letter-spacing: 0.04em; max-width: 60ch; }
      .hero .meta { display: flex; gap: 22px; font-size: 12px; color: var(--cyan); letter-spacing: 0.08em; }

      /* module grid */
      .mod-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .mod {
        border: 1px solid var(--line); padding: 16px; display: grid; gap: 10px; cursor: pointer;
        grid-template-rows: auto 1fr auto; transition: border-color 0.18s, background 0.18s, transform 0.12s;
      }
      .mod:hover { border-color: var(--line-bright); background: rgb(255 255 255 / 0.02); transform: translateY(-2px); }
      .mod.is-selected { border-color: rgb(var(--glow-red) / 0.6); background: rgb(var(--glow-red) / 0.06); }
      .mod-top { display: flex; align-items: center; justify-content: space-between; }
      .mod .nm { font-size: 14px; letter-spacing: 0.05em; color: var(--ink); }
      .mod .st { font-size: 10px; letter-spacing: 0.14em; }
      .mod .st.loaded { color: var(--accent); }
      .mod .st.standby { color: var(--ink-faint); }
      .mod .dsc { font-size: 11px; color: var(--ink-dim); letter-spacing: 0.03em; }
      .mod .mt { display: flex; gap: 14px; font-size: 10px; color: var(--ink-faint); letter-spacing: 0.06em; }

      .glyph {
        width: 38px; height: 38px; display: grid; place-items: center;
        border: 1px solid var(--line-bright); font-size: 18px; color: var(--ink);
        background-image: repeating-linear-gradient(0deg, rgb(255 255 255 / 0.05) 0px, rgb(255 255 255 / 0.05) 1px, transparent 1px, transparent 3px);
      }
      .glyph--red { border-color: var(--accent); color: var(--accent); background-color: rgb(var(--glow-red) / 0.12); }
      .glyph--gold { border-color: var(--gold); color: var(--gold); }
      .glyph--cyan { border-color: var(--cyan); color: var(--cyan); }

      /* commander action */
      .cmd { display: grid; gap: 12px; margin-top: 6px; }
      .cmd .access { font-size: 11px; letter-spacing: 0.2em; color: var(--ink-faint); text-align: center; text-transform: uppercase; }
      .btn--init { font-size: 15px; padding: 20px; justify-content: center; gap: 14px; }
      .cmd-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

      /* ===== RIGHT: operators + ranking ===== */
      .op {
        display: grid; grid-template-columns: 38px 1fr auto; gap: 12px; align-items: center;
        padding: 12px 0; border-bottom: 1px solid var(--line);
      }
      .op .nm { font-size: 13px; letter-spacing: 0.04em; color: var(--ink); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .op.is-off .nm, .op.is-off .ip { color: var(--ink-faint); }
      .op .ip { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.04em; margin-top: 3px; }
      .op .st { text-align: right; font-size: 11px; letter-spacing: 0.06em; }
      .op .st .meta { display: block; font-size: 10px; color: var(--ink-faint); margin-top: 2px; }
      .role {
        font-size: 9px; letter-spacing: 0.1em; padding: 2px 6px; border: 1px solid; white-space: nowrap;
      }
      .role--cmd { color: var(--accent); border-color: rgb(var(--glow-red) / 0.5); background: rgb(var(--glow-red) / 0.1); }
      .role--temp { color: var(--cyan); border-color: rgb(43 214 255 / 0.4); background: rgb(43 214 255 / 0.08); }

      /* ranking */
      .rank { display: grid; gap: 4px; }
      .rank-row { display: grid; grid-template-columns: 22px 1fr auto; align-items: center; gap: 10px; padding: 8px 0; }
      .rank-row .pos { font-size: 13px; font-weight: 700; color: var(--ink-dim); text-align: center; }
      .rank-row.top .pos { color: var(--gold); }
      .rank-row .who { font-size: 11px; color: var(--ink-dim); letter-spacing: 0.04em; }
      .rank-row .bar { grid-column: 1 / -1; height: 2px; background: var(--line); position: relative; }
      .rank-row .bar i { position: absolute; inset: 0; background: var(--accent-soft); }
      .rank-row .sc { font-size: 11px; color: var(--ink); letter-spacing: 0.06em; }

      /* ---- bottom bar ---- */
      .botbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: end; gap: 20px; }
      .botbar .mid { text-align: center; font-size: 11px; color: var(--ink-faint); letter-spacing: 0.1em; }

      @media (max-width: 1100px) {
        body { overflow: auto; }
        .shell { height: auto; overflow: visible; }
        .cols { grid-template-columns: 1fr; }
        .col, .col--center { overflow: visible; grid-template-rows: none; }
        .avail { grid-template-rows: none; }
        .avail .mod-grid { overflow: visible; }
        .mod-grid { grid-template-columns: 1fr 1fr; }
      }
      @media (max-width: 620px) {
        .topbar, .botbar { grid-template-columns: 1fr; gap: 14px; }
        .readout--r, .botbar .mid { text-align: left; }
        .mod-grid, .cmd-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="fx fx--grid"></div>
    <div class="fx fx--scanlines"></div>
    <div class="fx fx--vignette"></div>
    <div class="sweep"></div>

    <span class="corner corner--tl"></span>
    <span class="corner corner--tr"></span>
    <span class="corner corner--bl"></span>
    <span class="corner corner--br"></span>

    <div class="shell boot">
      <!-- TOP BAR -->
      <header class="topbar">
        <div class="readout" data-bind="topLeft"></div>
        <div class="sector">
          <div class="lbl" data-bind="sectorLabel"></div>
          <div class="code">
            <span id="sectorCode">#F92A1</span>
            <button class="copy" id="copy" title="copy">&#x2750;</button>
          </div>
        </div>
        <div class="readout readout--r" data-bind="topRight"></div>
      </header>

      <!-- 3 COLUMNS -->
      <div class="cols">
        <!-- LEFT: access / share -->
        <section class="col">
          <div>
            <div class="panel-label" data-bind="authLabel"></div>
            <div class="link-box">
              <div class="link-url" id="joinUrl"></div>
              <button class="btn btn--sm" id="copyLink">
                <span data-bind="copyLinkLabel"></span><span>&#x2750;</span>
              </button>
            </div>
          </div>
          <div class="qr-wrap">
            <div class="panel-label" data-bind="scanLabel"></div>
            <div class="qr-box hud-box hud-box--bracket"><div class="qr" id="qr"></div></div>
            <div class="sub-note" data-bind="syncLabel"></div>
          </div>
          <div class="enc">
            <div class="enc-row"><span data-bind="encLabel"></span><span class="s-online" data-bind="encState"></span></div>
            <div class="enc-bar"><i></i></div>
            <div class="readout" style="margin-top:10px">
              <div data-bind="globalUsers"></div>
              <div><span class="dot"></span><span data-bind="uptime"></span></div>
            </div>
          </div>
        </section>

        <!-- CENTER: module selection (MAIN) -->
        <section class="col col--center">
          <div class="head-row">
            <h2 data-bind="moduleHeading"></h2>
            <span class="count-chip" id="modCount"></span>
            <span class="priority" data-bind="priority"></span>
          </div>

          <div class="hero" id="hero"></div>

          <div class="avail">
            <div class="panel-label" data-bind="availableLabel"></div>
            <div class="mod-grid" id="modGrid"></div>
          </div>

          <div class="cmd">
            <div class="access" data-bind="cmdAccess"></div>
            <button class="btn btn--primary btn--init" id="init">
              <span data-bind="initLabel"></span><span>&#x2192;</span>
            </button>
            <div class="cmd-row">
              <button class="btn btn--sm" id="settings"><span data-bind="settingsLabel"></span></button>
              <button class="btn btn--sm btn--danger" id="closeRoom"><span data-bind="closeLabel"></span></button>
            </div>
          </div>
        </section>

        <!-- RIGHT: operators + ranking -->
        <section class="col">
          <div>
            <div class="head-row" style="margin-bottom:14px">
              <div class="panel-label" style="margin:0" data-bind="operatorsLabel"></div>
              <span class="count-chip" id="opCount"></span>
            </div>
            <div id="opList"></div>
          </div>
          <div>
            <div class="panel-label" data-bind="rankLabel"></div>
            <div class="rank" id="rankList"></div>
            <div class="sub-note" style="text-align:left;margin-top:10px" data-bind="rankNote"></div>
          </div>
        </section>
      </div>

      <!-- CONFIRM EJECT modal -->
      <div class="modal-backdrop" id="ejectModal">
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modal-head"><h3>⚠ CONFIRM_EJECT</h3><button class="x" data-eject-close>✕</button></div>
          <div class="modal-body">
            <p style="margin:0;font-size:12px;line-height:1.8;color:var(--ink-dim);letter-spacing:0.04em">
              You are about to <span class="hot">TERMINATE</span> sector
              <span style="color:var(--ink)">#F92A1</span> for all 04 operators. This action is
              irreversible within the current calibration cycle.
            </p>
          </div>
          <div class="modal-foot">
            <button class="btn btn--sm" data-eject-close><span>ABORT</span></button>
            <button class="btn btn--sm btn--danger" id="ejectConfirm"><span>● CONFIRM_EJECT</span></button>
          </div>
        </div>
      </div>

      <!-- BOTTOM BAR -->
      <footer class="botbar">
        <div class="readout" data-bind="connType"></div>
        <div class="mid" data-bind="botMid"></div>
        <div class="readout readout--r" data-bind="botRight"></div>
      </footer>
    </div>

    <script src="oneshot-data.js"></script>
    <script>
      let selected = 0;

      window.CONTENT = {
        topLeft: () => `<div>BR-K/S/61X-081</div><div>SECTOR_ID: <span class="hot">#${CONFIG.sector}</span></div><div><span class="dot"></span>STATUS: LOBBY_ACTIVE</div>`,
        topRight: () => `<div>SYS.OS_V.4.20.1</div><div>${liveLatency()}</div><div>LOC: SUB-LEVEL 4</div><div>${liveClock()}</div>`,
        sectorLabel: () => "SECTOR_ACCESS_CODE",
        authLabel: () => "AUTHORIZATION_LINK",
        copyLinkLabel: () => "COPY_LINK",
        scanLabel: () => "SCAN_FOR_MOBILE_ENTRY",
        syncLabel: () => "DIRECT_ENCRYPTION_SYNC",
        encLabel: () => "LOCAL_ENCRYPTION",
        encState: () => "ENABLED",
        moduleHeading: () => "SELECT_MODULE",
        priority: () => "PRIORITY: HIGH",
        availableLabel: () => "AVAILABLE_MODULES",
        cmdAccess: () => "COMMANDER_ONLY_ACCESS",
        initLabel: () => "INITIALIZE_SEQUENCE",
        settingsLabel: () => "⚙ SETTINGS",
        closeLabel: () => "⏻ CLOSE_ROOM",
        operatorsLabel: () => "OPERATORS_MANIFEST",
        rankLabel: () => "SESSION_RANKING",
        rankNote: () => "// WINS THIS SESSION",
        connType: () => `CONNECTION_TYPE: AES-256_ENCRYPTED_TUNNEL //<br>PROTOCOL_STABLE`,
        botMid: () => "A SYSTEM OF CELLS INTERLINKED",
        botRight: () => `<div>CONSTANT K...</div><div>[ SCAN_FOR_PROTOCOL ]</div>`,
        globalUsers: liveGlobalUsers,
        uptime: liveUptime,
      };

      /* ---- render selected hero ---- */
      function renderHero() {
        const g = GAMES[selected];
        document.getElementById("hero").innerHTML = `
          <div class="sel">CURRENTLY_SELECTED</div>
          <div class="title">${g.key}.EXE</div>
          <div class="desc">${g.desc}</div>
          <div class="meta"><span>⧉ ${g.players} PLAYERS</span><span>◷ ${g.time}</span></div>`;
      }

      /* ---- render module grid ---- */
      function renderModules() {
        document.getElementById("modGrid").innerHTML = GAMES.map((g, i) => `
          <div class="mod ${i === selected ? "is-selected" : ""}" data-i="${i}">
            <div class="mod-top">
              <span class="glyph glyph--${g.accent}">${g.glyph}</span>
              <span class="st ${i === selected ? "loaded" : "standby"}">${i === selected ? "LOADED" : "STANDBY"}</span>
            </div>
            <div>
              <div class="nm">${g.key}</div>
              <div class="dsc">${g.desc}</div>
            </div>
            <div class="mt"><span>${g.players} PLAYERS</span><span>${g.time}</span></div>
          </div>`).join("");
      }

      /* ---- render operators (players) ---- */
      function renderOperators() {
        document.getElementById("opList").innerHTML = OPERATORS.map((o) => {
          const off = o.status === "OFFLINE" ? "is-off" : "";
          const role = o.role === "COMMANDER"
            ? `<span class="role role--cmd">♛ COMMANDER</span>`
            : o.role === "TEMP_COMMAND" ? `<span class="role role--temp">⛨ TEMP_COMMAND</span>` : "";
          return `
            <div class="op ${off}">
              ${avatarBox(o.avatarId)}
              <span>
                <div class="nm">${o.name} ${role}</div>
                <div class="ip">IP: ${o.ip}</div>
              </span>
              <span class="st">
                <span class="${STATUS_CLASS[o.status]}"><span class="dot ${STATUS_DOT[o.status]}" style="margin-right:5px"></span>${o.status}</span>
                <span class="meta">${o.meta}</span>
              </span>
            </div>`;
        }).join("");
        document.getElementById("opCount").textContent =
          String(OPERATORS.filter((o) => o.status !== "OFFLINE").length).padStart(2, "0") + "/08";
      }

      /* ---- render ranking (added UI) ---- */
      function renderRanking() {
        const sorted = [...OPERATORS].sort((a, b) => b.wins - a.wins);
        const max = Math.max(1, ...sorted.map((o) => o.wins));
        document.getElementById("rankList").innerHTML = sorted.map((o, i) => `
          <div class="rank-row ${i === 0 ? "top" : ""}">
            <span class="pos">${String(i + 1).padStart(2, "0")}</span>
            <span class="who">${o.name}</span>
            <span class="sc">${o.wins} W</span>
            <span class="bar"><i style="right:${100 - (o.wins / max) * 100}%"></i></span>
          </div>`).join("");
      }

      /* ---- placeholder QR ---- */
      function renderQR() {
        const seed = "1011001 0100110 1101011 0010100 1011101 0101010 1100110".split(" ");
        let cells = "";
        for (let r = 0; r < 7; r++)
          for (let c = 0; c < 7; c++)
            cells += `<i class="${seed[r][c] === "1" ? "" : "b0"}"></i>`;
        document.getElementById("qr").innerHTML = cells;
      }

      /* ---- init ---- */
      document.getElementById("modCount").textContent = "01/" + String(GAMES.length).padStart(2, "0");
      document.getElementById("joinUrl").textContent = CONFIG.joinUrl;
      renderHero(); renderModules(); renderOperators(); renderRanking(); renderQR();
      renderBindings();
      startLiveLoop(["globalUsers", "uptime", "topRight"]);

      document.getElementById("modGrid").addEventListener("click", (e) => {
        const card = e.target.closest(".mod");
        if (!card) return;
        selected = Number(card.dataset.i);
        renderHero(); renderModules();
        document.getElementById("modCount").textContent =
          String(selected + 1).padStart(2, "0") + "/" + String(GAMES.length).padStart(2, "0");
      });

      const copyMsg = () => { const c = document.getElementById("copy"); c.innerHTML = "✓"; setTimeout(() => (c.innerHTML = "&#x2750;"), 1200); };
      document.getElementById("copy").addEventListener("click", copyMsg);
      document.getElementById("copyLink").addEventListener("click", copyMsg);
      document.getElementById("init").addEventListener("click", () => {
        const b = document.getElementById("sectorCode");
        b.style.animation = "rgb-split 0.6s ease-out 1 both";
        setTimeout(() => (location.href = "oneshot-results.html"), 650);
      });

      /* confirm-eject modal */
      const eject = document.getElementById("ejectModal");
      document.getElementById("closeRoom").addEventListener("click", () => eject.classList.add("open"));
      eject.querySelectorAll("[data-eject-close]").forEach((b) => b.addEventListener("click", () => eject.classList.remove("open")));
      eject.addEventListener("click", (e) => { if (e.target === eject) eject.classList.remove("open"); });
      document.getElementById("ejectConfirm").addEventListener("click", () => (location.href = "oneshot-home.html"));

      /* settings modal — updates the host operator (you) live */
      const settings = mountSettings({
        onSave: (next) => {
          const me = OPERATORS[0];
          if (next.nickname) me.name = next.nickname.toUpperCase().replace(/\s+/g, "_");
          me.avatarId = next.avatarId;
          me.accent = avatarById(next.avatarId).accent;
          renderOperators();
          renderRanking();
        },
      });
      document.getElementById("settings").addEventListener("click", settings.open);
    </script>
  </body>
</html>
