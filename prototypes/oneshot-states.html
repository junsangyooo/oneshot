<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneShot — Link States</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="oneshot.css" />
    <style>
      body { overflow: hidden; }
      .shell {
        position: relative; z-index: 2; height: 100svh; padding: var(--frame-pad);
        display: grid; grid-template-rows: auto 1fr auto; gap: 18px;
      }
      .topbar, .botbar { display: flex; justify-content: space-between; align-items: flex-start; }
      .botbar { align-items: flex-end; }
      .readout--r { text-align: right; }

      /* dev state switcher */
      .switcher {
        position: fixed; top: var(--frame-pad); left: 50%; transform: translateX(-50%); z-index: 8;
        display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
        background: rgb(10 7 16 / 0.6); border: 1px solid var(--line); padding: 6px;
      }
      .switcher button {
        font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
        color: var(--ink-dim); background: transparent; border: 1px solid transparent; padding: 6px 9px; cursor: pointer;
      }
      .switcher button:hover { color: var(--ink); border-color: var(--line); }
      .switcher button.on { color: var(--accent); border-color: rgb(var(--glow-red) / 0.5); background: rgb(var(--glow-red) / 0.08); }

      .stage { align-self: center; justify-self: center; width: min(560px, 92vw); text-align: center; display: grid; gap: 26px; }

      .emblem { justify-self: center; position: relative; width: 96px; height: 96px; display: grid; place-items: center; }
      .ring {
        position: absolute; inset: 0; border: 2px solid var(--line); border-top-color: var(--cyan); border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .emblem .ico { font-size: 38px; }
      .emblem.is-cyan .ico { color: var(--cyan); }
      .emblem.is-red .ico { color: var(--accent); }
      .emblem.is-warn .ico { color: var(--warn); }
      .emblem.is-red .ring { border-top-color: var(--accent); animation: none; opacity: 0.4; }
      .emblem.is-warn .ring { border-top-color: var(--warn); animation: none; opacity: 0.4; }
      .emblem.no-ring .ring { display: none; }

      .st-title {
        font-family: var(--font-display); font-weight: 700; letter-spacing: 0.05em;
        font-size: clamp(30px, 5.5vw, 56px); line-height: 0.95; color: #d6d3df; margin: 0;
      }
      .st-title.glitch { animation: glitch-txt 1.4s steps(2) infinite; color: #fff; }
      @keyframes glitch-txt {
        0%, 100% { text-shadow: 0 0 30px rgb(var(--glow-red) / 0.3); transform: none; }
        48% { text-shadow: -3px 0 var(--accent), 3px 0 var(--cyan); transform: translateX(1px); }
        52% { text-shadow: 3px 0 var(--accent), -3px 0 var(--cyan); transform: translateX(-2px); }
      }
      .st-code { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; }
      .st-code.c-cyan { color: var(--cyan); }
      .st-code.c-red { color: var(--accent); }
      .st-code.c-warn { color: var(--warn); }
      .st-msg { font-size: 13px; color: var(--ink-dim); letter-spacing: 0.05em; line-height: 1.7; max-width: 46ch; justify-self: center; }

      .pbar { height: 4px; background: var(--line); position: relative; overflow: hidden; width: min(360px, 80%); justify-self: center; }
      .pbar i { position: absolute; inset: 0; background: linear-gradient(90deg, var(--warn), var(--cyan)); width: 40%; animation: load 1.8s ease-in-out infinite; }
      @keyframes load { 0% { left: -40%; } 100% { left: 100%; } }

      .st-actions { display: flex; gap: 14px; justify-content: center; }
      .st-actions .btn { min-width: 180px; justify-content: center; }
      .dots::after { content: ""; animation: dots 1.4s steps(4, end) infinite; }
      @keyframes dots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } }
    </style>
  </head>
  <body>
    <div class="fx fx--grid"></div>
    <div class="fx fx--scanlines"></div>
    <div class="fx fx--vignette"></div>

    <span class="corner corner--tl"></span>
    <span class="corner corner--tr"></span>
    <span class="corner corner--bl"></span>
    <span class="corner corner--br"></span>

    <div class="switcher" id="switcher"></div>

    <div class="shell">
      <header class="topbar">
        <div class="readout" data-bind="topLeft"></div>
        <div class="readout readout--r" data-bind="topRight"></div>
      </header>

      <main class="stage" id="stage"></main>

      <footer class="botbar">
        <div class="readout" data-bind="connType"></div>
        <div class="readout readout--r" data-bind="botRight"></div>
      </footer>
    </div>

    <script src="oneshot-data.js"></script>
    <script>
      const STATES = [
        { key: "ESTABLISHING_UPLINK", code: "LINK_01", accent: "cyan", ico: "◴", ring: true,
          title: "ESTABLISHING UPLINK", dots: true,
          msg: "Synchronizing with the sector grid. Hold position while the secure channel is negotiated.",
          actions: [] },
        { key: "UPLINK_SEVERED", code: "LINK_02 // ERR", accent: "red", ico: "⚠", ring: true,
          title: "UPLINK SEVERED", glitch: true,
          msg: "The connection to the sector dropped. Your seat is held — re-establish the link to resume.",
          actions: [{ label: "↻ RECONNECT", primary: true }, { label: "RETURN_HOME" }] },
        { key: "RECONNECTION_IN_PROGRESS", code: "LINK_03", accent: "warn", ico: "⟳", ring: false, bar: true,
          title: "RECONNECTING", dots: true,
          msg: "Re-establishing secure channel. Your role, seat and hand are being restored.",
          actions: [] },
        { key: "SECTOR_LOST", code: "LINK_04 // ERR", accent: "red", ico: "⊘", ring: false,
          title: "SECTOR LOST", glitch: true,
          msg: "This sector no longer exists. It may have been closed by the commander or expired after inactivity.",
          actions: [{ label: "↩ RETURN_TO_HOME", primary: true }] },
        { key: "ACCESS_DENIED", code: "LINK_05 // DENIED", accent: "red", ico: "⛔", ring: false,
          title: "ACCESS DENIED", glitch: true,
          msg: "Entry refused. The sector is full or your clearance was revoked by the commander.",
          actions: [{ label: "↩ RETURN_TO_HOME", primary: true }] },
        { key: "SECTOR_CODE_INVALID", code: "INPUT // ERR", accent: "red", ico: "✕", ring: false,
          title: "SECTOR CODE INVALID", glitch: true,
          msg: "No active sector matches that access code. Check the code or request a fresh authorization link.",
          actions: [{ label: "← BACK_TO_INPUT", primary: true }] },
      ];
      let cur = 0;

      window.CONTENT = {
        topLeft: () => `<div>BR-K/S/61X-081</div><div>SECTOR_ID: <span class="hot">#${CONFIG.sector}</span></div><div><span class="dot ${STATES[cur].accent === "cyan" ? "dot--ok" : STATES[cur].accent === "warn" ? "dot--warn" : ""}"></span>${STATES[cur].key}</div>`,
        topRight: () => `<div>SYS.OS_V.4.20.1</div><div>${liveLatency()}</div><div>${liveClock()}</div>`,
        connType: () => `CONNECTION_TYPE: AES-256_ENCRYPTED_TUNNEL //<br>PROTOCOL_${STATES[cur].accent === "red" ? "<span class='hot'>UNSTABLE</span>" : "NEGOTIATING"}`,
        botRight: () => `<div>A SYSTEM OF CELLS INTERLINKED</div><div>[ ${STATES[cur].code} ]</div>`,
      };

      function renderState() {
        const s = STATES[cur];
        const emblemCls = `emblem is-${s.accent} ${s.ring ? "" : "no-ring"}`;
        const actions = s.actions.map((a) =>
          `<button class="btn ${a.primary ? "btn--primary" : ""}"><span>${a.label}</span></button>`).join("");
        document.getElementById("stage").innerHTML = `
          <div class="${emblemCls}"><span class="ring"></span><span class="ico">${s.ico}</span></div>
          <div class="st-code c-${s.accent}">${s.code}</div>
          <h1 class="st-title ${s.glitch ? "glitch" : ""}">${s.title}${s.dots ? '<span class="dots"></span>' : ""}</h1>
          <p class="st-msg">${s.msg}</p>
          ${s.bar ? '<div class="pbar"><i></i></div>' : ""}
          ${actions ? `<div class="st-actions">${actions}</div>` : ""}`;
        document.querySelectorAll("#switcher button").forEach((b, i) => b.classList.toggle("on", i === cur));
        renderBindings();
      }

      document.getElementById("switcher").innerHTML = STATES.map((s, i) =>
        `<button data-i="${i}">${s.key}</button>`).join("");
      document.getElementById("switcher").addEventListener("click", (e) => {
        const b = e.target.closest("button"); if (!b) return;
        cur = Number(b.dataset.i); renderState();
      });

      renderState();
      startLiveLoop(["topRight"]);
    </script>
  </body>
</html>
