<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Dalmuti</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>
<body>
    <h1>The Great Dalmuti</h1>
    <div>
        <input id="roomName" type="text" placeholder="Room Name">
        <button onclick="createRoom()">Create Room</button>
        <button onclick="joinRoom()">Join Room</button>
    </div>
    <div>
        <button onclick="dealCards()">Deal Cards</button>
    </div>
    <ul id="messages"></ul>

    <script>
        const socket = io();

        socket.on('connect', function() {
            console.log('Connected to the server');
        });

        socket.on('room_created', function(data) {
            document.getElementById('messages').innerHTML += `<li>Room ${data.room} created</li>`;
        });

        socket.on('player_joined', function(data) {
            document.getElementById('messages').innerHTML += `<li>Player ${data.player} joined</li>`;
        });

        socket.on('cards_dealt', function(data) {
            document.getElementById('messages').innerHTML += `<li>Cards: ${data.cards.join(', ')}</li>`;
        });

        function createRoom() {
            const room = document.getElementById('roomName').value;
            socket.emit('create_room', room);
        }

        function joinRoom() {
            const room = document.getElementById('roomName').value;
            socket.emit('join_room', { room: room, player: 'Player1' });
        }

        function dealCards() {
            const room = document.getElementById('roomName').value;
            socket.emit('deal_cards', room);
        }
    </script>
</body>
</html>
